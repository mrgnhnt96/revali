name: CI Smoke

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Smoke test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: .github/scripts/ci-smoke.ps1
            log_dir: logs/ci-smoke
          - os: macos-latest
            script: .github/scripts/ci-smoke.sh
            log_dir: logs/ci-smoke

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Run smoke test (small_test)
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            pwsh "${{ github.workspace }}/${{ matrix.script }}"
          else
            chmod +x "${{ github.workspace }}/${{ matrix.script }}"
            "${{ github.workspace }}/${{ matrix.script }}"
          fi

      - name: Upload smoke test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-smoke-logs-${{ matrix.os }}-${{ github.run_id }}
          path: ${{ matrix.log_dir }}/
          if-no-files-found: warn
          retention-days: 14

      - name: Print summary log
        if: always()
        shell: bash
        run: |
          summary="${{ github.workspace }}/${{ matrix.log_dir }}/summary.log"
          if [[ -f "$summary" ]]; then
            echo "----- summary.log -----"
            cat "$summary"
          else
            echo "summary.log was not created."
